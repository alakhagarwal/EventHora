spring.application.name=EventHora-Backend
spring.profiles.active=dev

spring.datasource.url=jdbc:postgresql://localhost:5434/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.data.redis.host=localhost
spring.data.redis.port=6379

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.bucket.name=${S3_BUCKET_NAME}

# Razorpay — get these from dashboard.razorpay.com > Settings > API Keys (Test Mode)
razorpay.api.key=${RAZORPAY_KEY_ID}
razorpay.api.secret=${RAZORPAY_KEY_SECRET}

# Razorpay Webhook Secret — set this from dashboard.razorpay.com > Settings > Webhooks
# This is a DIFFERENT secret from the API secret above.
# In test mode: copy the secret you set when creating the webhook on the dashboard.
# In live mode: copy the live webhook secret.
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}
